#!/usr/bin/env bash

APP_NAME="app"
APP_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/$APP_NAME"

function check_dep() {
  command -v "$APP_NAME" >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Install dependency for $APP_NAME here"
  # Example:
  # run sudo pacman -S --noconfirm "$APP_NAME"
}

function check() {
  local src_dir="$rootdir/items/$APP_NAME/src"
  [ -L "$APP_CONF_DIR" ] && [ "$(readlink "$APP_CONF_DIR")" = "$src_dir" ]
}

function install() {
  local src_dir="$rootdir/items/$APP_NAME/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $APP_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$APP_CONF_DIR")"

  if [ -d "$APP_CONF_DIR" ] && [ ! -L "$APP_CONF_DIR" ]; then
    mv "$APP_CONF_DIR" "${APP_CONF_DIR}.bak"
  elif [ -e "$APP_CONF_DIR" ] || [ -L "$APP_CONF_DIR" ]; then
    rm -rf "$APP_CONF_DIR"
  fi

  ln -snf "$src_dir" "$APP_CONF_DIR"
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $APP_CONF_DIR"
    return 0
  fi

  [ -L "$APP_CONF_DIR" ] && rm -f "$APP_CONF_DIR"
}

