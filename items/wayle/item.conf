#!/usr/bin/env bash

WAYLE_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/wayle"

function check_dep() {
  if ! command -v wayle >/dev/null 2>&1; then
    echo "Missing dependency: wayle"
    return 1
  fi

  if [ ! -f /usr/lib/systemd/user/wayle.service ]; then
    echo "Missing user unit: /usr/lib/systemd/user/wayle.service"
    return 1
  fi

  return 0
}

function install_dep() {
  echo "Install Wayle with: paru -S wayle-bin"
}

function _backup_wayle_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  mv "$path" "${backup}.${index}" || return 1
}

function check() {
  local src_dir="$rootdir/items/wayle/src"

  [ -L "$WAYLE_CONF_DIR" ] && [ "$(readlink "$WAYLE_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$WAYLE_CONF_DIR/config.toml" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/wayle/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $WAYLE_CONF_DIR -> $src_dir"
    echo "Would leave wayle.service disabled unless started manually"
    return 0
  fi

  mkdir -p "$(dirname "$WAYLE_CONF_DIR")" || return 1

  if [ -d "$WAYLE_CONF_DIR" ] && [ ! -L "$WAYLE_CONF_DIR" ]; then
    _backup_wayle_path "$WAYLE_CONF_DIR" || return 1
  elif [ -e "$WAYLE_CONF_DIR" ] || [ -L "$WAYLE_CONF_DIR" ]; then
    rm -rf "$WAYLE_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$WAYLE_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/wayle/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $WAYLE_CONF_DIR"
    return 0
  fi

  if [ -L "$WAYLE_CONF_DIR" ] && [ "$(readlink "$WAYLE_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$WAYLE_CONF_DIR" || return 1
  fi
}
