# DotfileBootstrapper yazi config
# UI settings stay close to the Neovim rose-pine-dawn setup.

[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 8
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
image_delay = 30
image_filter = "triangle"
image_quality = 80

[which]
sort_by = "key"
sort_sensitive = false
sort_reverse = false
sort_translit = false
