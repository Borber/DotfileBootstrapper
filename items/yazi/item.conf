#!/usr/bin/env bash

YAZI_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/yazi"

function check_dep() {
  command -v yazi >/dev/null 2>&1 || return 1
  command -v ya >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: yazi"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm yazi || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install yazi || return 1
  else
    echo "No supported package manager detected. Install yazi manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/yazi/src"

  [ -L "$YAZI_CONF_DIR" ] && [ "$(readlink "$YAZI_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$YAZI_CONF_DIR/yazi.toml" ] || return 1
  [ -f "$YAZI_CONF_DIR/theme.toml" ] || return 1
  [ -f "$YAZI_CONF_DIR/init.lua" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/yazi/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $YAZI_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$YAZI_CONF_DIR")" || return 1

  if [ -d "$YAZI_CONF_DIR" ] && [ ! -L "$YAZI_CONF_DIR" ]; then
    mv "$YAZI_CONF_DIR" "${YAZI_CONF_DIR}.bak" || return 1
  elif [ -e "$YAZI_CONF_DIR" ] || [ -L "$YAZI_CONF_DIR" ]; then
    rm -rf "$YAZI_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$YAZI_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/yazi/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $YAZI_CONF_DIR"
    return 0
  fi

  if [ -L "$YAZI_CONF_DIR" ] && [ "$(readlink "$YAZI_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$YAZI_CONF_DIR" || return 1
  fi
}
