#!/usr/bin/env bash

WL_KBPTR_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/wl-kbptr"
WL_KBPTR_CONFIG="$WL_KBPTR_CONF_DIR/config"

function check_dep() {
  local missing=0

  if ! command -v wl-kbptr >/dev/null 2>&1; then
    echo "Missing dependency: wl-kbptr"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependency: wl-kbptr"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed wl-kbptr || return 1
  else
    echo "Missing dependency installer: paru"
    echo "Install manually: paru -S --needed wl-kbptr"
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/wl-kbptr/src"

  [ -L "$WL_KBPTR_CONF_DIR" ] && [ "$(readlink "$WL_KBPTR_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$WL_KBPTR_CONFIG" ] || return 1
  grep -F "home_row_keys=asdfqwerjkl" "$WL_KBPTR_CONFIG" >/dev/null 2>&1 || return 1
  grep -F "modes=bisect" "$WL_KBPTR_CONFIG" >/dev/null 2>&1 || return 1
}

function install() {
  local src_dir="$rootdir/items/wl-kbptr/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $WL_KBPTR_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$WL_KBPTR_CONF_DIR")" || return 1

  if [ -d "$WL_KBPTR_CONF_DIR" ] && [ ! -L "$WL_KBPTR_CONF_DIR" ]; then
    mv "$WL_KBPTR_CONF_DIR" "${WL_KBPTR_CONF_DIR}.bak" || return 1
  elif [ -e "$WL_KBPTR_CONF_DIR" ] || [ -L "$WL_KBPTR_CONF_DIR" ]; then
    rm -rf "$WL_KBPTR_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$WL_KBPTR_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/wl-kbptr/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $WL_KBPTR_CONF_DIR"
    return 0
  fi

  if [ -L "$WL_KBPTR_CONF_DIR" ] && [ "$(readlink "$WL_KBPTR_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$WL_KBPTR_CONF_DIR" || return 1
  fi
}
