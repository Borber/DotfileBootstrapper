#!/usr/bin/env bash

NOCTALIA_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/noctalia"
NOCTALIA_STATE_DIR="${NOCTALIA_STATE_HOME:-${XDG_STATE_HOME:-$HOME/.local/state}}/noctalia"
NOCTALIA_SETTINGS_FILE="$NOCTALIA_STATE_DIR/settings.toml"
NOCTALIA_SYSTEMD_USER_DIR="${CONFIG_DIR:-$HOME/.config}/systemd/user"
NOCTALIA_SERVICE_NAME="noctalia.service"
NOCTALIA_SERVICE_PATH="$NOCTALIA_SYSTEMD_USER_DIR/$NOCTALIA_SERVICE_NAME"
NOCTALIA_SERVICE_WANTS_DIR="$NOCTALIA_SYSTEMD_USER_DIR/graphical-session.target.wants"
NOCTALIA_SERVICE_WANTS_LINK="$NOCTALIA_SERVICE_WANTS_DIR/$NOCTALIA_SERVICE_NAME"

function check_dep() {
  if ! command -v noctalia >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/noctalia" ]; then
    echo "Missing dependency: noctalia"
    return 1
  fi

  return 0
}

function install_dep() {
  echo "Install Noctalia with: ./bootstrap install --item=noctalia-local -c -D -v"
}

function _backup_noctalia_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  mv "$path" "${backup}.${index}" || return 1
}

function _import_noctalia_gui_settings() {
  local import_script="$rootdir/items/noctalia/import-gui-settings.sh"
  local import_args=()

  if [[ "${dry_run:-0}" == 1 ]]; then
    import_args+=(--dry-run)
  fi

  bash "$import_script" "${import_args[@]}" || return 1
}

function _reload_noctalia_systemd_user() {
  if command -v systemctl >/dev/null 2>&1; then
    systemctl --user daemon-reload >/dev/null 2>&1 || echo "Warning: failed to reload systemd user manager"
  fi
}

function check() {
  local src_dir="$rootdir/items/noctalia/src"
  local service_src="$rootdir/items/noctalia/systemd/$NOCTALIA_SERVICE_NAME"

  [ -L "$NOCTALIA_CONF_DIR" ] && [ "$(readlink "$NOCTALIA_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$NOCTALIA_CONF_DIR/config.toml" ] || return 1
  [ -L "$NOCTALIA_SERVICE_PATH" ] && [ "$(readlink "$NOCTALIA_SERVICE_PATH")" = "$service_src" ] || return 1
  [ -L "$NOCTALIA_SERVICE_WANTS_LINK" ] && [ "$(readlink "$NOCTALIA_SERVICE_WANTS_LINK")" = "$NOCTALIA_SERVICE_PATH" ] || return 1

  # App-written settings override declarative config, so a non-empty file means
  # the managed config is not the whole effective configuration.
  [ ! -s "$NOCTALIA_SETTINGS_FILE" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/noctalia/src"
  local service_src="$rootdir/items/noctalia/systemd/$NOCTALIA_SERVICE_NAME"

  if [[ "${NOCTALIA_IMPORT_GUI:-0}" == 1 ]]; then
    _import_noctalia_gui_settings || return 1
  fi

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $NOCTALIA_CONF_DIR -> $src_dir"
    echo "Would link $NOCTALIA_SERVICE_PATH -> $service_src"
    echo "Would enable $NOCTALIA_SERVICE_NAME for graphical-session.target"
    echo "Would reload systemd user manager"
    if [ -s "$NOCTALIA_SETTINGS_FILE" ]; then
      echo "Would back up non-empty Noctalia app override file at $NOCTALIA_SETTINGS_FILE"
    else
      echo "No non-empty Noctalia app override file found at $NOCTALIA_SETTINGS_FILE"
    fi
    return 0
  fi

  mkdir -p "$(dirname "$NOCTALIA_CONF_DIR")" || return 1
  mkdir -p "$NOCTALIA_SYSTEMD_USER_DIR" "$NOCTALIA_SERVICE_WANTS_DIR" || return 1

  if [ -d "$NOCTALIA_CONF_DIR" ] && [ ! -L "$NOCTALIA_CONF_DIR" ]; then
    _backup_noctalia_path "$NOCTALIA_CONF_DIR" || return 1
  elif [ -e "$NOCTALIA_CONF_DIR" ] || [ -L "$NOCTALIA_CONF_DIR" ]; then
    rm -rf "$NOCTALIA_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$NOCTALIA_CONF_DIR" || return 1

  if [ -d "$NOCTALIA_SERVICE_PATH" ] && [ ! -L "$NOCTALIA_SERVICE_PATH" ]; then
    _backup_noctalia_path "$NOCTALIA_SERVICE_PATH" || return 1
  elif [ -e "$NOCTALIA_SERVICE_PATH" ] || [ -L "$NOCTALIA_SERVICE_PATH" ]; then
    rm -rf "$NOCTALIA_SERVICE_PATH" || return 1
  fi

  ln -snf "$service_src" "$NOCTALIA_SERVICE_PATH" || return 1
  ln -snf "$NOCTALIA_SERVICE_PATH" "$NOCTALIA_SERVICE_WANTS_LINK" || return 1
  _reload_noctalia_systemd_user

  if [ -s "$NOCTALIA_SETTINGS_FILE" ]; then
    _backup_noctalia_path "$NOCTALIA_SETTINGS_FILE" || return 1
  elif [ -e "$NOCTALIA_SETTINGS_FILE" ]; then
    rm -f "$NOCTALIA_SETTINGS_FILE" || return 1
  fi
}

function uninstall() {
  local src_dir="$rootdir/items/noctalia/src"
  local service_src="$rootdir/items/noctalia/systemd/$NOCTALIA_SERVICE_NAME"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $NOCTALIA_CONF_DIR"
    echo "Would disable $NOCTALIA_SERVICE_NAME for graphical-session.target"
    echo "Would remove $NOCTALIA_SERVICE_PATH"
    echo "Would reload systemd user manager"
    return 0
  fi

  if [ -L "$NOCTALIA_CONF_DIR" ] && [ "$(readlink "$NOCTALIA_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$NOCTALIA_CONF_DIR" || return 1
  fi

  if [ -L "$NOCTALIA_SERVICE_WANTS_LINK" ] && [ "$(readlink "$NOCTALIA_SERVICE_WANTS_LINK")" = "$NOCTALIA_SERVICE_PATH" ]; then
    rm -f "$NOCTALIA_SERVICE_WANTS_LINK" || return 1
  fi

  if [ -L "$NOCTALIA_SERVICE_PATH" ] && [ "$(readlink "$NOCTALIA_SERVICE_PATH")" = "$service_src" ]; then
    rm -f "$NOCTALIA_SERVICE_PATH" || return 1
  fi

  _reload_noctalia_systemd_user
}
