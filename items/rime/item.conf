#!/usr/bin/env bash

RIME_REPO_URL="https://github.com/Borber/rime-config.git"
RIME_CONF_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/fcitx5/rime"

function _rime_origin_matches() {
  local current_origin

  [ -d "$RIME_CONF_DIR/.git" ] || return 1
  current_origin="$(git -C "$RIME_CONF_DIR" remote get-url origin 2>/dev/null || true)"

  case "$current_origin" in
    "$RIME_REPO_URL"|"${RIME_REPO_URL%.git}")
      return 0
      ;;
    *)
      return 1
      ;;
  esac
}

function _rime_deploy() {
  if command -v rime_deployer >/dev/null 2>&1; then
    run rime_deployer --build "$RIME_CONF_DIR" || return 1
  elif command -v fcitx5-remote >/dev/null 2>&1; then
    run fcitx5-remote -r || return 1
  else
    echo "Rime config installed. Restart fcitx5 or deploy from the fcitx5 UI."
  fi
}

function _install_local_overrides() {
  local overrides_dir="$rootdir/items/rime/src"

  if [ -f "$overrides_dir/default.custom.yaml" ]; then
    cp "$overrides_dir/default.custom.yaml" "$RIME_CONF_DIR/default.custom.yaml" || return 1
  fi

  if [ -f "$overrides_dir/rime_ice.custom.yaml" ]; then
    cp "$overrides_dir/rime_ice.custom.yaml" "$RIME_CONF_DIR/rime_ice.custom.yaml" || return 1
  fi
}

function check_dep() {
  local missing=0

  for dep in fcitx5 git rime_deployer; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if [ ! -f /usr/share/fcitx5/addon/rime.conf ] && [ ! -f /usr/lib/fcitx5/librime.so ]; then
    echo "Missing fcitx5 addon: rime"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependencies:"
  echo "  - fcitx5-rime"
  echo "  - librime-luajit"
  echo "  - git"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed fcitx5-rime librime-luajit git || return 1
  elif command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm fcitx5-rime git || return 1
    echo "Install librime-luajit manually if your Rime Lua extensions do not deploy."
  else
    echo "No supported package manager detected. Install the required dependencies manually."
    return 1
  fi
}

function check() {
  _rime_origin_matches || return 1
  [ -f "$RIME_CONF_DIR/default.yaml" ] || return 1
  [ -f "$RIME_CONF_DIR/default.custom.yaml" ] || return 1
  [ -f "$RIME_CONF_DIR/rime_ice.custom.yaml" ] || return 1
  [ -f "$RIME_CONF_DIR/rime_ice.schema.yaml" ] || return 1
  [ -d "$RIME_CONF_DIR/lua" ] || return 1
  [ -d "$RIME_CONF_DIR/opencc" ] || return 1
  grep -F "ascii_composer/switch_key/Shift_L: commit_code" "$RIME_CONF_DIR/default.custom.yaml" >/dev/null 2>&1 || return 1
  grep -F "ascii_composer/switch_key/Shift_R: commit_code" "$RIME_CONF_DIR/default.custom.yaml" >/dev/null 2>&1 || return 1
  grep -F "menu/alternative_select_labels:" "$RIME_CONF_DIR/default.custom.yaml" >/dev/null 2>&1 || return 1
  grep -F "switches/@0/states: [ 中, En ]" "$RIME_CONF_DIR/rime_ice.custom.yaml" >/dev/null 2>&1 || return 1
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would clone or update $RIME_REPO_URL at $RIME_CONF_DIR"
    echo "Would install local Rime overrides"
    echo "Would deploy Rime config"
    return 0
  fi

  mkdir -p "$(dirname "$RIME_CONF_DIR")" || return 1

  if _rime_origin_matches; then
    echo "Updating existing Rime config..."
    run git -C "$RIME_CONF_DIR" pull --ff-only || return 1
  else
    if [ -e "$RIME_CONF_DIR" ] || [ -L "$RIME_CONF_DIR" ]; then
      echo "Backing up existing Rime config to ${RIME_CONF_DIR}.bak ..."
      mv "$RIME_CONF_DIR" "${RIME_CONF_DIR}.bak" || return 1
    fi

    echo "Cloning Rime config..."
    run git clone "$RIME_REPO_URL" "$RIME_CONF_DIR" || return 1
  fi

  _install_local_overrides || return 1
  _rime_deploy
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $RIME_CONF_DIR"
    return 0
  fi

  if _rime_origin_matches; then
    rm -rf "$RIME_CONF_DIR" || return 1
  else
    echo "Refusing to remove $RIME_CONF_DIR because it is not managed by $RIME_REPO_URL"
    return 1
  fi
}
