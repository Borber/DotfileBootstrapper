#!/usr/bin/env bash

NVIM_REPO_URL="https://github.com/borber/config-nvim.git"
NVIM_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/nvim"
NVIM_MIN_VERSION="0.12.0"

function _nvim_version() {
  nvim --version 2>/dev/null |
    sed -n '1s/^NVIM v//p' |
    sed 's/[^0-9.].*$//'
}

function _version_ge() {
  local current="$1"
  local required="$2"

  [ -n "$current" ] || return 1
  [ "$(printf '%s\n%s\n' "$required" "$current" | sort -V | head -n1)" = "$required" ]
}

function _origin_matches() {
  local current_origin

  [ -d "$NVIM_CONF_DIR/.git" ] || return 1
  current_origin="$(git -C "$NVIM_CONF_DIR" remote get-url origin 2>/dev/null || true)"

  case "$current_origin" in
    "$NVIM_REPO_URL"|"${NVIM_REPO_URL%.git}")
      return 0
      ;;
    *)
      return 1
      ;;
  esac
}

function _ensure_local_config() {
  local example_file="$NVIM_CONF_DIR/lua/config/local.example.lua"
  local local_file="$NVIM_CONF_DIR/lua/config/local.lua"

  if [ -f "$example_file" ] && [ ! -f "$local_file" ]; then
    cp "$example_file" "$local_file"
    echo "Created local private config: $local_file"
  fi
}

function _print_optional_deps() {
  echo "Optional README dependencies:"
  echo "  - rg, fd, cmake: better Telescope / fzf-native experience"
  echo "  - just, bun, npm, cargo: Overseer project task discovery"
  echo "  - Windows bookmarks: sqlite-dll via Scoop"
}

function check_dep() {
  local missing=0
  local version

  if ! command -v nvim >/dev/null 2>&1; then
    echo "Missing dependency: nvim >= $NVIM_MIN_VERSION"
    missing=1
  else
    version="$(_nvim_version)"
    if ! _version_ge "$version" "$NVIM_MIN_VERSION"; then
      echo "Neovim is too old: found ${version:-unknown}, need >= $NVIM_MIN_VERSION"
      missing=1
    fi
  fi

  if ! command -v git >/dev/null 2>&1; then
    echo "Missing dependency: git"
    missing=1
  fi

  if ! command -v tree-sitter >/dev/null 2>&1; then
    echo "Missing dependency: tree-sitter CLI"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependencies from config-nvim README:"
  echo "  - Neovim >= $NVIM_MIN_VERSION"
  echo "  - git"
  echo "  - tree-sitter CLI"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm neovim git tree-sitter-cli || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install neovim git tree-sitter || return 1
  else
    echo "No supported package manager detected. Install the required dependencies manually."
    _print_optional_deps
    return 1
  fi

  _print_optional_deps
}

function check() {
  _origin_matches || return 1
  [ -f "$NVIM_CONF_DIR/init.lua" ] || return 1
  [ -f "$NVIM_CONF_DIR/lua/config/local.lua" ] || return 1
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would clone or update $NVIM_REPO_URL at $NVIM_CONF_DIR"
    echo "Would create lua/config/local.lua from local.example.lua when missing"
    return 0
  fi

  mkdir -p "$(dirname "$NVIM_CONF_DIR")"

  if _origin_matches; then
    echo "Updating existing Neovim config..."
    run git -C "$NVIM_CONF_DIR" pull --ff-only || return 1
  else
    if [ -e "$NVIM_CONF_DIR" ] || [ -L "$NVIM_CONF_DIR" ]; then
      echo "Backing up existing Neovim config to ${NVIM_CONF_DIR}.bak ..."
      mv "$NVIM_CONF_DIR" "${NVIM_CONF_DIR}.bak"
    fi

    echo "Cloning Neovim config..."
    run git clone "$NVIM_REPO_URL" "$NVIM_CONF_DIR" || return 1
  fi

  _ensure_local_config
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $NVIM_CONF_DIR"
    return 0
  fi

  if _origin_matches; then
    rm -rf "$NVIM_CONF_DIR"
  else
    echo "Refusing to remove $NVIM_CONF_DIR because it is not managed by $NVIM_REPO_URL"
    return 1
  fi
}

