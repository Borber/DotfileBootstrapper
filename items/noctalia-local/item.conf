#!/usr/bin/env bash

NOCTALIA_REPO_URL="${NOCTALIA_REPO_URL:-https://github.com/noctalia-dev/noctalia-shell.git}"
NOCTALIA_BRANCH="${NOCTALIA_BRANCH:-v5}"
NOCTALIA_SOURCE_DIR="${NOCTALIA_SOURCE_DIR:-$HOME/git/noctalia}"
NOCTALIA_PREFIX="${NOCTALIA_PREFIX:-$HOME/.local}"
NOCTALIA_BUILD_MODE="${NOCTALIA_BUILD_MODE:-release}"
NOCTALIA_BUILD_DIR="$NOCTALIA_SOURCE_DIR/build-$NOCTALIA_BUILD_MODE"
NOCTALIA_BIN="$NOCTALIA_PREFIX/bin/noctalia"
NOCTALIA_ASSETS_DIR="$NOCTALIA_PREFIX/share/noctalia/assets"

function check_dep() {
  local missing=0
  local dep
  local pkg
  local command_deps=(
    git
    gcc
    g++
    just
    meson
    ninja
    pkg-config
  )
  local pkg_config_deps=(
    sdbus-c++
    wayland-client
    wayland-protocols
    wayland-egl
    freetype2
    fontconfig
    cairo
    cairo-ft
    pango
    pangocairo
    pangoft2
    harfbuzz
    librsvg-2.0
    xkbcommon
    glib-2.0
    gobject-2.0
    gio-2.0
    polkit-agent-1
    polkit-gobject-1
    libpipewire-0.3
    libcurl
    libwebp
    egl
    glesv2
  )

  for dep in "${command_deps[@]}"; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if command -v pkg-config >/dev/null 2>&1; then
    for pkg in "${pkg_config_deps[@]}"; do
      if ! pkg-config --exists "$pkg"; then
        echo "Missing pkg-config dependency: $pkg"
        missing=1
      fi
    done
  fi

  if ! ldconfig -p 2>/dev/null | grep -q 'libpam\.so' && [ ! -e /usr/lib/libpam.so ]; then
    echo "Missing dependency: pam"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  local arch_deps=(
    meson
    gcc
    just
    wayland
    wayland-protocols
    libglvnd
    freetype2
    fontconfig
    cairo
    pango
    harfbuzz
    libxkbcommon
    glib2
    sdbus-cpp
    libpipewire
    polkit
    pam
    curl
    libwebp
    librsvg
    ninja
    pkgconf
    jemalloc
  )

  echo "Required dependencies for Noctalia v5 local build:"
  printf '  - %s\n' "${arch_deps[@]}"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed --noconfirm "${arch_deps[@]}" || return 1
  elif command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm "${arch_deps[@]}" || return 1
  else
    echo "No supported package manager detected. Install the required dependencies manually."
    return 1
  fi
}

function _noctalia_remote_matches() {
  local remote

  remote="$(git -C "$NOCTALIA_SOURCE_DIR" config --get remote.origin.url 2>/dev/null)" || remote=""

  case "$remote" in
    "$NOCTALIA_REPO_URL" | \
    "https://github.com/noctalia-dev/noctalia-shell" | \
    "https://github.com/noctalia-dev/noctalia-shell.git" | \
    "git@github.com:noctalia-dev/noctalia-shell.git")
      return 0
      ;;
  esac

  return 1
}

function _backup_noctalia_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  mv "$path" "${backup}.${index}" || return 1
}

function _noctalia_source_dirty() {
  [ -n "$(git -C "$NOCTALIA_SOURCE_DIR" status --porcelain 2>/dev/null)" ]
}

function _ensure_noctalia_checkout() {
  local parent_dir
  local current_branch

  if [ -d "$NOCTALIA_SOURCE_DIR/.git" ]; then
    if ! _noctalia_remote_matches; then
      _backup_noctalia_path "$NOCTALIA_SOURCE_DIR" || return 1
      parent_dir="$(dirname "$NOCTALIA_SOURCE_DIR")"
      mkdir -p "$parent_dir" || return 1
      git clone --branch "$NOCTALIA_BRANCH" "$NOCTALIA_REPO_URL" "$NOCTALIA_SOURCE_DIR" || return 1
      return 0
    fi

    git -C "$NOCTALIA_SOURCE_DIR" fetch origin "$NOCTALIA_BRANCH" || return 1

    current_branch="$(git -C "$NOCTALIA_SOURCE_DIR" rev-parse --abbrev-ref HEAD 2>/dev/null)" || current_branch=""
    if [ "$current_branch" != "$NOCTALIA_BRANCH" ]; then
      if _noctalia_source_dirty; then
        echo "Noctalia source has local changes; commit or stash them before switching branches." >&2
        return 1
      fi
      git -C "$NOCTALIA_SOURCE_DIR" checkout -B "$NOCTALIA_BRANCH" "origin/$NOCTALIA_BRANCH" || return 1
    fi

    if _noctalia_source_dirty; then
      echo "Noctalia source has local changes; commit or stash them before updating." >&2
      return 1
    fi

    git -C "$NOCTALIA_SOURCE_DIR" merge --ff-only "origin/$NOCTALIA_BRANCH" || return 1
    return 0
  fi

  if [ -e "$NOCTALIA_SOURCE_DIR" ] || [ -L "$NOCTALIA_SOURCE_DIR" ]; then
    _backup_noctalia_path "$NOCTALIA_SOURCE_DIR" || return 1
  fi

  parent_dir="$(dirname "$NOCTALIA_SOURCE_DIR")"
  mkdir -p "$parent_dir" || return 1
  git clone --branch "$NOCTALIA_BRANCH" "$NOCTALIA_REPO_URL" "$NOCTALIA_SOURCE_DIR" || return 1
}

function check() {
  [ -d "$NOCTALIA_SOURCE_DIR/.git" ] || return 1
  _noctalia_remote_matches || return 1
  [ "$(git -C "$NOCTALIA_SOURCE_DIR" rev-parse --abbrev-ref HEAD 2>/dev/null)" = "$NOCTALIA_BRANCH" ] || return 1
  [ -x "$NOCTALIA_BUILD_DIR/noctalia" ] || return 1
  [ -x "$NOCTALIA_BIN" ] || return 1
  [ -d "$NOCTALIA_ASSETS_DIR" ] || return 1
  [ -f "$NOCTALIA_ASSETS_DIR/noctalia.svg" ] || return 1
  [ -f "$NOCTALIA_ASSETS_DIR/emoji.json" ] || return 1
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would ensure $NOCTALIA_SOURCE_DIR is a checkout of $NOCTALIA_REPO_URL branch $NOCTALIA_BRANCH"
    echo "Would back up any existing non-matching source path before cloning"
    echo "Would fetch and fast-forward $NOCTALIA_BRANCH when the source checkout already exists"
    echo "Would configure Noctalia with prefix $NOCTALIA_PREFIX in $NOCTALIA_BUILD_DIR"
    echo "Would build Noctalia in $NOCTALIA_BUILD_MODE mode"
    echo "Would install Noctalia binary and assets under $NOCTALIA_PREFIX"
    return 0
  fi

  _ensure_noctalia_checkout || return 1

  (
    cd "$NOCTALIA_SOURCE_DIR" || exit 1
    just configure "$NOCTALIA_BUILD_MODE" "$NOCTALIA_PREFIX" || exit 1
    just build "$NOCTALIA_BUILD_MODE" || exit 1
    just install "$NOCTALIA_BUILD_MODE" || exit 1
  ) || return 1
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would uninstall Noctalia files installed from $NOCTALIA_BUILD_DIR"
    echo "Would keep source checkout at $NOCTALIA_SOURCE_DIR"
    return 0
  fi

  if [ -f "$NOCTALIA_BUILD_DIR/build.ninja" ]; then
    (
      cd "$NOCTALIA_SOURCE_DIR" || exit 1
      just uninstall "$NOCTALIA_BUILD_MODE" || exit 1
    ) || return 1
  else
    rm -f "$NOCTALIA_BIN" || return 1
    rm -rf "$NOCTALIA_PREFIX/share/noctalia" || return 1
  fi
}
