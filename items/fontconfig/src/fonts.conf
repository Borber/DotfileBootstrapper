<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

  <match target="font">
    <test name="color" compare="not_eq">
      <bool>true</bool>
    </test>
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- Prefer LXGW Bright for Chinese UI text with strong binding. -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh</string>
    </test>
    <test qual="any" name="family" compare="eq">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW Bright</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh</string>
    </test>
    <test qual="any" name="family" compare="eq">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW Bright</string>
    </edit>
  </match>

  <!-- Telegram Desktop uses bundled Open Sans; prefer LXGW for missing Chinese glyphs. -->
  <match target="pattern">
    <test qual="any" name="family" compare="eq">
      <string>Open Sans</string>
    </test>
    <edit name="family" mode="append" binding="strong">
      <string>LXGW Bright</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family" compare="eq">
      <string>Open Sans Semibold</string>
    </test>
    <edit name="family" mode="append" binding="strong">
      <string>LXGW Bright</string>
    </edit>
  </match>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>LXGW Bright</family>
      <family>Noto Sans</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>LXGW Bright</family>
      <family>Noto Serif</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>Noto Sans Mono</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
