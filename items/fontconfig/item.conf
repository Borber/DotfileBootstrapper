#!/usr/bin/env bash

FONTCONFIG_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/fontconfig"
FONTCONFIG_PACKAGES=(ttf-maplemono-nf ttf-lxgw-bright noto-fonts-emoji)

function _font_available() {
  local family="$1"

  fc-match "$family" 2>/dev/null | grep -F "\"$family\"" >/dev/null 2>&1
}

function check_dep() {
  local missing=0

  for dep in fc-match fc-cache grep; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if command -v fc-match >/dev/null 2>&1; then
    if ! _font_available "Maple Mono NF"; then
      echo "Missing font: Maple Mono NF"
      missing=1
    fi

    if ! _font_available "LXGW Bright"; then
      echo "Missing font: LXGW Bright"
      missing=1
    fi

    if ! _font_available "Noto Color Emoji"; then
      echo "Missing font: Noto Color Emoji"
      missing=1
    fi
  fi

  return "$missing"
}

function install_dep() {
  echo "Required font packages:"
  echo "  - ttf-maplemono-nf"
  echo "  - ttf-lxgw-bright"
  echo "  - noto-fonts-emoji"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed "${FONTCONFIG_PACKAGES[@]}" || return 1
  else
    echo "Missing dependency installer: paru"
    echo "Install manually: paru -S ttf-maplemono-nf ttf-lxgw-bright noto-fonts-emoji"
    return 1
  fi

  run fc-cache -f || return 1
}

function check() {
  local src_dir="$rootdir/items/fontconfig/src"

  [ -L "$FONTCONFIG_CONF_DIR" ] && [ "$(readlink "$FONTCONFIG_CONF_DIR")" = "$src_dir" ]
}

function install() {
  local src_dir="$rootdir/items/fontconfig/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $FONTCONFIG_CONF_DIR -> $src_dir"
    echo "Would refresh fontconfig cache"
    return 0
  fi

  mkdir -p "$(dirname "$FONTCONFIG_CONF_DIR")" || return 1

  if [ -d "$FONTCONFIG_CONF_DIR" ] && [ ! -L "$FONTCONFIG_CONF_DIR" ]; then
    mv "$FONTCONFIG_CONF_DIR" "${FONTCONFIG_CONF_DIR}.bak" || return 1
  elif [ -e "$FONTCONFIG_CONF_DIR" ] || [ -L "$FONTCONFIG_CONF_DIR" ]; then
    rm -rf "$FONTCONFIG_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$FONTCONFIG_CONF_DIR" || return 1
  run fc-cache -f || return 1
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $FONTCONFIG_CONF_DIR"
    echo "Would refresh fontconfig cache"
    return 0
  fi

  if [ -L "$FONTCONFIG_CONF_DIR" ]; then
    rm -f "$FONTCONFIG_CONF_DIR" || return 1
  fi

  run fc-cache -f || return 1
}
