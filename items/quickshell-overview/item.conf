#!/usr/bin/env bash

OVERVIEW_REPO_URL="https://github.com/Shanu-Kumawat/quickshell-overview.git"
OVERVIEW_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/quickshell/overview"
OVERVIEW_COMMON_DIR="$OVERVIEW_CONF_DIR/common"
OVERVIEW_CONFIG="$OVERVIEW_CONF_DIR/config.json"
OVERVIEW_APPEARANCE="$OVERVIEW_COMMON_DIR/Appearance.qml"
OVERVIEW_COLORS="$OVERVIEW_COMMON_DIR/Appearance.colors.qml"
OVERVIEW_LUA_DISPATCH_PATCH_REL="items/quickshell-overview/src/patches/hyprland-lua-dispatch.patch"

function check_dep() {
  local missing=0

  if ! command -v git >/dev/null 2>&1; then
    echo "Missing dependency: git"
    missing=1
  fi

  if ! command -v qs >/dev/null 2>&1 && ! command -v quickshell >/dev/null 2>&1; then
    echo "Missing dependency: qs"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Install git and quickshell with the system package manager before installing this item."
}

function _overview_remote_matches() {
  local remote

  remote="$(git -C "$OVERVIEW_CONF_DIR" config --get remote.origin.url 2>/dev/null)" || remote=""

  case "$remote" in
    "https://github.com/Shanu-Kumawat/quickshell-overview" | \
    "https://github.com/Shanu-Kumawat/quickshell-overview.git" | \
    "git@github.com:Shanu-Kumawat/quickshell-overview.git")
      return 0
      ;;
  esac

  return 1
}

function check() {
  local src_dir="$rootdir/items/quickshell-overview/src"

  [ -d "$OVERVIEW_CONF_DIR/.git" ] || return 1
  _overview_remote_matches || return 1
  [ -f "$OVERVIEW_CONF_DIR/shell.qml" ] || return 1
  [ -d "$OVERVIEW_CONF_DIR/modules" ] || return 1
  [ -d "$OVERVIEW_CONF_DIR/services" ] || return 1
  [ -d "$OVERVIEW_COMMON_DIR" ] || return 1
  [ -f "$OVERVIEW_CONFIG" ] || return 1
  [ -f "$OVERVIEW_APPEARANCE" ] || return 1
  [ -f "$OVERVIEW_COLORS" ] || return 1
  cmp -s "$src_dir/config.json" "$OVERVIEW_CONFIG" || return 1
  grep -F 'source: "Appearance.colors.qml"' "$OVERVIEW_APPEARANCE" >/dev/null 2>&1 || return 1
  grep -F "property color colLayer2Border" "$OVERVIEW_APPEARANCE" >/dev/null 2>&1 || return 1
  grep -F "property color colTooltip: colLayer2" "$OVERVIEW_APPEARANCE" >/dev/null 2>&1 || return 1
  grep -F "property color colOnTooltip: colOnLayer2" "$OVERVIEW_APPEARANCE" >/dev/null 2>&1 || return 1
  cmp -s "$src_dir/common/Appearance.colors.qml" "$OVERVIEW_COLORS" || return 1
  _overview_lua_dispatch_patch_applied || return 1
}

function _backup_overview_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  mv "$path" "${backup}.${index}" || return 1
}

function _install_overview_file() {
  local src="$1"
  local dest="$2"

  if cmp -s "$src" "$dest"; then
    return 0
  fi

  if [ -e "$dest" ] && [ ! -L "$dest" ]; then
    _backup_overview_path "$dest" || return 1
  elif [ -L "$dest" ]; then
    rm -f "$dest" || return 1
  fi

  cp "$src" "$dest" || return 1
}

function _clone_overview_repo() {
  local parent_dir

  parent_dir="$(dirname "$OVERVIEW_CONF_DIR")"
  mkdir -p "$parent_dir" || return 1
  git clone "$OVERVIEW_REPO_URL" "$OVERVIEW_CONF_DIR" || return 1
}

function _ensure_overview_checkout() {
  if [ -d "$OVERVIEW_CONF_DIR/.git" ]; then
    _overview_remote_matches && return 0
    _backup_overview_path "$OVERVIEW_CONF_DIR" || return 1
  elif [ -e "$OVERVIEW_CONF_DIR" ] || [ -L "$OVERVIEW_CONF_DIR" ]; then
    _backup_overview_path "$OVERVIEW_CONF_DIR" || return 1
  fi

  _clone_overview_repo || return 1
}

function _patch_overview_appearance() {
  local tmp="${OVERVIEW_APPEARANCE}.tmp"

  [ -f "$OVERVIEW_APPEARANCE" ] || return 1

  awk '
    {
      if ($0 ~ /^[[:space:]]*property color colLayer2Border:/) {
        next
      }
      if ($0 ~ /^[[:space:]]*property color colTooltip:/) {
        print "        property color colTooltip: colLayer2"
        next
      }
      if ($0 ~ /^[[:space:]]*property color colOnTooltip:/) {
        print "        property color colOnTooltip: colOnLayer2"
        next
      }

      print
      if ($0 ~ /property color colLayer2: m3colors\.m3surfaceContainer/) {
        print "        property color colLayer2Border: ColorUtils.mix(root.m3colors.m3outlineVariant, colLayer2, 0.5)"
      }
    }
  ' "$OVERVIEW_APPEARANCE" > "$tmp" || return 1

  mv "$tmp" "$OVERVIEW_APPEARANCE" || return 1
}

function _overview_lua_dispatch_patch_applied() {
  local overview_qml="$OVERVIEW_CONF_DIR/modules/overview/Overview.qml"
  local widget_qml="$OVERVIEW_CONF_DIR/modules/overview/OverviewWidget.qml"

  [ -f "$overview_qml" ] || return 1
  [ -f "$widget_qml" ] || return 1
  grep -F "function dispatchWorkspace(workspaceId)" "$overview_qml" >/dev/null 2>&1 || return 1
  grep -F "root.dispatchWorkspace(clampedTarget)" "$overview_qml" >/dev/null 2>&1 || return 1
  grep -F "function dispatchMoveWindowToWorkspace(workspace, address)" "$widget_qml" >/dev/null 2>&1 || return 1
  grep -F "function dispatchFocusWindow(address)" "$widget_qml" >/dev/null 2>&1 || return 1
  grep -F "Hyprland.usingLua" "$widget_qml" >/dev/null 2>&1 || return 1
}

function _patch_overview_lua_dispatch() {
  local patch_file="$rootdir/$OVERVIEW_LUA_DISPATCH_PATCH_REL"

  _overview_lua_dispatch_patch_applied && return 0
  [ -f "$patch_file" ] || return 1

  if ! git -C "$OVERVIEW_CONF_DIR" apply --check "$patch_file"; then
    echo "Failed to apply quickshell-overview Hyprland Lua dispatch patch: $patch_file" >&2
    return 1
  fi

  git -C "$OVERVIEW_CONF_DIR" apply "$patch_file" || return 1
  _overview_lua_dispatch_patch_applied || return 1
}

function install() {
  local src_dir="$rootdir/items/quickshell-overview/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would ensure $OVERVIEW_CONF_DIR is a checkout of $OVERVIEW_REPO_URL"
    echo "Would back up any existing non-matching overview directory before cloning"
    echo "Would install overview config to $OVERVIEW_CONFIG"
    echo "Would install overview colors to $OVERVIEW_COLORS"
    echo "Would patch tooltip and border colors in $OVERVIEW_APPEARANCE"
    echo "Would apply Hyprland Lua dispatch compatibility patch from $rootdir/$OVERVIEW_LUA_DISPATCH_PATCH_REL"
    return 0
  fi

  _ensure_overview_checkout || return 1
  mkdir -p "$OVERVIEW_COMMON_DIR" || return 1
  _install_overview_file "$src_dir/config.json" "$OVERVIEW_CONFIG" || return 1
  _install_overview_file "$src_dir/common/Appearance.colors.qml" "$OVERVIEW_COLORS" || return 1
  _patch_overview_appearance || return 1
  _patch_overview_lua_dispatch || return 1
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would move managed overview checkout at $OVERVIEW_CONF_DIR to a .bak path"
    return 0
  fi

  [ -d "$OVERVIEW_CONF_DIR/.git" ] || return 0
  _overview_remote_matches || return 0
  _backup_overview_path "$OVERVIEW_CONF_DIR" || return 1
}
