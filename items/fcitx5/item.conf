#!/usr/bin/env bash

FCITX5_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/fcitx5"
FCITX5_THEME_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/fcitx5/themes/borber-wechat-light"
FCITX5_INPUTMETHOD_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/fcitx5/inputmethod"
FCITX5_RIME_INPUTMETHOD_CONF="$FCITX5_INPUTMETHOD_DIR/rime.conf"

function check_dep() {
  local missing=0

  for dep in fcitx5 fcitx5-remote; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if [ ! -f /usr/share/fcitx5/inputmethod/rime.conf ]; then
    echo "Missing input method: rime"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependencies:"
  echo "  - fcitx5"
  echo "  - fcitx5-rime"
  echo "  - fcitx5-configtool"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed fcitx5 fcitx5-rime fcitx5-configtool || return 1
  elif command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm fcitx5 fcitx5-rime fcitx5-configtool || return 1
  else
    echo "No supported package manager detected. Install the required dependencies manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/fcitx5/src"
  local theme_src="$src_dir/themes/borber-wechat-light"
  local rime_inputmethod_src="$src_dir/inputmethod/rime.conf"

  [ -L "$FCITX5_CONF_DIR" ] && [ "$(readlink "$FCITX5_CONF_DIR")" = "$src_dir" ] || return 1
  [ -L "$FCITX5_THEME_DIR" ] && [ "$(readlink "$FCITX5_THEME_DIR")" = "$theme_src" ] || return 1
  [ -L "$FCITX5_RIME_INPUTMETHOD_CONF" ] && [ "$(readlink "$FCITX5_RIME_INPUTMETHOD_CONF")" = "$rime_inputmethod_src" ] || return 1
  grep -F "Name=rime" "$FCITX5_CONF_DIR/profile" >/dev/null 2>&1 || return 1
  grep -F "CompactInputMethodInformation=True" "$FCITX5_CONF_DIR/config" >/dev/null 2>&1 || return 1
  grep -F "ShowFirstInputMethodInformation=True" "$FCITX5_CONF_DIR/config" >/dev/null 2>&1 || return 1
  grep -F "Theme=borber-wechat-light" "$FCITX5_CONF_DIR/conf/classicui.conf" >/dev/null 2>&1 || return 1
  grep -F "Label=中" "$FCITX5_RIME_INPUTMETHOD_CONF" >/dev/null 2>&1 || return 1
  awk '
    /^\[keyboard-us\]$/ { in_keyboard_us = 1; next }
    /^\[/ { in_keyboard_us = 0 }
    in_keyboard_us && /^Label=En$/ { found = 1 }
    END { exit found ? 0 : 1 }
  ' "$FCITX5_CONF_DIR/conf/cached_layouts" || return 1
}

function _write_profile() {
  if [ -f "$FCITX5_CONF_DIR/profile" ]; then
    return 0
  fi

  cat > "$FCITX5_CONF_DIR/profile" <<'EOF'
[Groups/0]
# Group Name
Name=Default
# Layout
Default Layout=us
# Default Input Method
DefaultIM=rime

[Groups/0/Items/0]
# Name
Name=rime
# Layout
Layout=

[Groups/0/Items/1]
# Name
Name=keyboard-us
# Layout
Layout=

[GroupOrder]
0=Default

EOF
}

function _stop_fcitx5() {
  if pgrep -x fcitx5 >/dev/null 2>&1; then
    pkill -x fcitx5 || return 1
    sleep 1
  fi
}

function install() {
  local src_dir="$rootdir/items/fcitx5/src"
  local theme_src="$src_dir/themes/borber-wechat-light"
  local rime_inputmethod_src="$src_dir/inputmethod/rime.conf"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $FCITX5_CONF_DIR -> $src_dir"
    echo "Would link $FCITX5_THEME_DIR -> $theme_src"
    echo "Would link $FCITX5_RIME_INPUTMETHOD_CONF -> $rime_inputmethod_src"
    echo "Would restart fcitx5 when it is running"
    return 0
  fi

  _stop_fcitx5 || return 1

  mkdir -p "$(dirname "$FCITX5_CONF_DIR")" || return 1
  mkdir -p "$(dirname "$FCITX5_THEME_DIR")" || return 1
  mkdir -p "$FCITX5_INPUTMETHOD_DIR" || return 1

  if [ -d "$FCITX5_CONF_DIR" ] && [ ! -L "$FCITX5_CONF_DIR" ]; then
    mv "$FCITX5_CONF_DIR" "${FCITX5_CONF_DIR}.bak" || return 1
  elif [ -e "$FCITX5_CONF_DIR" ] || [ -L "$FCITX5_CONF_DIR" ]; then
    rm -rf "$FCITX5_CONF_DIR" || return 1
  fi

  if [ -d "$FCITX5_THEME_DIR" ] && [ ! -L "$FCITX5_THEME_DIR" ]; then
    mv "$FCITX5_THEME_DIR" "${FCITX5_THEME_DIR}.bak" || return 1
  elif [ -e "$FCITX5_THEME_DIR" ] || [ -L "$FCITX5_THEME_DIR" ]; then
    rm -rf "$FCITX5_THEME_DIR" || return 1
  fi

  if [ -e "$FCITX5_RIME_INPUTMETHOD_CONF" ] && [ ! -L "$FCITX5_RIME_INPUTMETHOD_CONF" ]; then
    mv "$FCITX5_RIME_INPUTMETHOD_CONF" "${FCITX5_RIME_INPUTMETHOD_CONF}.bak" || return 1
  elif [ -e "$FCITX5_RIME_INPUTMETHOD_CONF" ] || [ -L "$FCITX5_RIME_INPUTMETHOD_CONF" ]; then
    rm -f "$FCITX5_RIME_INPUTMETHOD_CONF" || return 1
  fi

  ln -snf "$src_dir" "$FCITX5_CONF_DIR" || return 1
  ln -snf "$theme_src" "$FCITX5_THEME_DIR" || return 1
  ln -snf "$rime_inputmethod_src" "$FCITX5_RIME_INPUTMETHOD_CONF" || return 1
  _write_profile || return 1

  run fcitx5 -d --replace || true
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $FCITX5_CONF_DIR"
    echo "Would remove $FCITX5_THEME_DIR"
    echo "Would remove $FCITX5_RIME_INPUTMETHOD_CONF"
    return 0
  fi

  local rime_inputmethod_src="$rootdir/items/fcitx5/src/inputmethod/rime.conf"

  if [ -L "$FCITX5_CONF_DIR" ]; then
    rm -f "$FCITX5_CONF_DIR" || return 1
  fi

  if [ -L "$FCITX5_THEME_DIR" ]; then
    rm -f "$FCITX5_THEME_DIR" || return 1
  fi

  if [ -L "$FCITX5_RIME_INPUTMETHOD_CONF" ] && [ "$(readlink "$FCITX5_RIME_INPUTMETHOD_CONF")" = "$rime_inputmethod_src" ]; then
    rm -f "$FCITX5_RIME_INPUTMETHOD_CONF" || return 1
  fi
}
