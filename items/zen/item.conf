#!/usr/bin/env bash

ZEN_CONFIG_DIR="${CONFIG_DIR:-$HOME/.config}/zen"
ZEN_PROFILE_USER_JS="user.js"
ZEN_PROFILE_CHROME_DIR="chrome"
ZEN_CHROME_FILES=(
  "userChrome.css"
  "rose-pine-main.css"
  "rose-pine-moon.css"
  "rose-pine-dawn.css"
)

function _zen_profiles_ini() {
  printf '%s\n' "$ZEN_CONFIG_DIR/profiles.ini"
}

function _zen_profile_path_from_install() {
  local ini="$1"

  awk '
    /^\[Install/ { in_install = 1; next }
    /^\[/ { in_install = 0 }
    in_install && /^Default=/ {
      sub(/^Default=/, "")
      print
      exit
    }
  ' "$ini"
}

function _zen_default_profile_info() {
  local ini="$1"

  awk '
    function flush() {
      if (in_profile && is_default == 1 && path != "") {
        print is_relative "|" path
        exit
      }
    }

    /^\[/ {
      flush()
      in_profile = ($0 ~ /^\[Profile[0-9]+\]/)
      is_default = 0
      is_relative = 1
      path = ""
      next
    }

    in_profile && /^Default=1$/ {
      is_default = 1
      next
    }

    in_profile && /^IsRelative=/ {
      sub(/^IsRelative=/, "")
      is_relative = $0
      next
    }

    in_profile && /^Path=/ {
      sub(/^Path=/, "")
      path = $0
      next
    }

    END {
      flush()
    }
  ' "$ini"
}

function _zen_profile_dir() {
  local ini
  local install_path
  local profile_info
  local is_relative
  local profile_path

  ini="$(_zen_profiles_ini)"
  [ -f "$ini" ] || return 1

  install_path="$(_zen_profile_path_from_install "$ini")"
  if [ -n "$install_path" ]; then
    if [[ "$install_path" = /* ]]; then
      [ -d "$install_path" ] && printf '%s\n' "$install_path" && return 0
    else
      [ -d "$ZEN_CONFIG_DIR/$install_path" ] && printf '%s\n' "$ZEN_CONFIG_DIR/$install_path" && return 0
    fi
  fi

  profile_info="$(_zen_default_profile_info "$ini")"
  [ -n "$profile_info" ] || return 1

  is_relative="${profile_info%%|*}"
  profile_path="${profile_info#*|}"

  if [[ "$is_relative" == 0 || "$profile_path" = /* ]]; then
    [ -d "$profile_path" ] || return 1
    printf '%s\n' "$profile_path"
  else
    [ -d "$ZEN_CONFIG_DIR/$profile_path" ] || return 1
    printf '%s\n' "$ZEN_CONFIG_DIR/$profile_path"
  fi
}

function _zen_user_js_target() {
  local profile_dir

  profile_dir="$(_zen_profile_dir)" || return 1
  printf '%s/%s\n' "$profile_dir" "$ZEN_PROFILE_USER_JS"
}

function _zen_chrome_dir() {
  local profile_dir

  profile_dir="$(_zen_profile_dir)" || return 1
  printf '%s/%s\n' "$profile_dir" "$ZEN_PROFILE_CHROME_DIR"
}

function _zen_backup_path() {
  local path="$1"
  local backup="${path}.bak"
  local n=1

  while [ -e "$backup" ] || [ -L "$backup" ]; do
    backup="${path}.bak.$n"
    n=$((n + 1))
  done

  printf '%s\n' "$backup"
}

function _zen_link_file() {
  local src_file="$1"
  local target_file="$2"
  local backup_file

  if [ -e "$target_file" ] && [ ! -L "$target_file" ]; then
    backup_file="$(_zen_backup_path "$target_file")"
    mv "$target_file" "$backup_file" || return 1
  elif [ -L "$target_file" ]; then
    rm -f "$target_file" || return 1
  fi

  ln -snf "$src_file" "$target_file" || return 1
}

function check_dep() {
  local missing=0

  for dep in awk readlink; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if ! command -v zen-browser >/dev/null 2>&1; then
    echo "Missing dependency: zen-browser"
    missing=1
  fi

  if [ ! -f "$(_zen_profiles_ini)" ]; then
    echo "Missing Zen profiles.ini: $(_zen_profiles_ini)"
    missing=1
  elif ! _zen_profile_dir >/dev/null 2>&1; then
    echo "Unable to resolve Zen default profile"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required packages:"
  echo "  - zen-browser-bin"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed zen-browser-bin || return 1
  else
    echo "Missing dependency installer: paru"
    echo "Install manually: paru -S zen-browser-bin"
    return 1
  fi
}

function check() {
  local user_js_src="$rootdir/items/zen/src/user.js"
  local user_js_target
  local chrome_dir
  local name
  local src_file
  local target_file

  user_js_target="$(_zen_user_js_target)" || return 1
  [ -f "$user_js_src" ] || return 1
  [ -L "$user_js_target" ] && [ "$(readlink "$user_js_target")" = "$user_js_src" ] || return 1

  chrome_dir="$(_zen_chrome_dir)" || return 1
  for name in "${ZEN_CHROME_FILES[@]}"; do
    src_file="$rootdir/items/zen/src/chrome/$name"
    target_file="$chrome_dir/$name"
    [ -f "$src_file" ] || return 1
    [ -L "$target_file" ] && [ "$(readlink "$target_file")" = "$src_file" ] || return 1
  done

  return 0
}

function install() {
  local user_js_src="$rootdir/items/zen/src/user.js"
  local user_js_target
  local chrome_dir
  local name
  local src_file
  local target_file

  user_js_target="$(_zen_user_js_target)" || return 1
  chrome_dir="$(_zen_chrome_dir)" || return 1

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $user_js_target -> $user_js_src"
    for name in "${ZEN_CHROME_FILES[@]}"; do
      echo "Would link $chrome_dir/$name -> $rootdir/items/zen/src/chrome/$name"
    done
    return 0
  fi

  mkdir -p "$chrome_dir" || return 1
  _zen_link_file "$user_js_src" "$user_js_target" || return 1

  for name in "${ZEN_CHROME_FILES[@]}"; do
    src_file="$rootdir/items/zen/src/chrome/$name"
    target_file="$chrome_dir/$name"
    _zen_link_file "$src_file" "$target_file" || return 1
  done
}

function uninstall() {
  local user_js_src="$rootdir/items/zen/src/user.js"
  local user_js_target
  local chrome_dir
  local name
  local src_file
  local target_file

  user_js_target="$(_zen_user_js_target)" || return 1
  chrome_dir="$(_zen_chrome_dir)" || return 1

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $user_js_target if it points to $user_js_src"
    for name in "${ZEN_CHROME_FILES[@]}"; do
      echo "Would remove $chrome_dir/$name if it points to $rootdir/items/zen/src/chrome/$name"
    done
    return 0
  fi

  if [ -L "$user_js_target" ] && [ "$(readlink "$user_js_target")" = "$user_js_src" ]; then
    rm -f "$user_js_target" || return 1
  fi

  for name in "${ZEN_CHROME_FILES[@]}"; do
    src_file="$rootdir/items/zen/src/chrome/$name"
    target_file="$chrome_dir/$name"
    if [ -L "$target_file" ] && [ "$(readlink "$target_file")" = "$src_file" ]; then
      rm -f "$target_file" || return 1
    fi
  done
}
