#!/usr/bin/env bash

FASTFETCH_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/fastfetch"

function check_dep() {
  command -v fastfetch >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: fastfetch"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm fastfetch || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install fastfetch || return 1
  elif command -v apt-get >/dev/null 2>&1; then
    run sudo apt-get install -y fastfetch || return 1
  elif command -v dnf >/dev/null 2>&1; then
    run sudo dnf install -y fastfetch || return 1
  else
    echo "No supported package manager detected. Install fastfetch manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/fastfetch/src"

  [ -L "$FASTFETCH_CONF_DIR" ] && [ "$(readlink "$FASTFETCH_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$FASTFETCH_CONF_DIR/config.jsonc" ] || return 1
  grep -F "DotfileBootstrapper fastfetch theme" "$FASTFETCH_CONF_DIR/config.jsonc" >/dev/null 2>&1 || return 1
}

function install() {
  local src_dir="$rootdir/items/fastfetch/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $FASTFETCH_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$FASTFETCH_CONF_DIR")" || return 1

  if [ -d "$FASTFETCH_CONF_DIR" ] && [ ! -L "$FASTFETCH_CONF_DIR" ]; then
    mv "$FASTFETCH_CONF_DIR" "${FASTFETCH_CONF_DIR}.bak" || return 1
  elif [ -e "$FASTFETCH_CONF_DIR" ] || [ -L "$FASTFETCH_CONF_DIR" ]; then
    rm -rf "$FASTFETCH_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$FASTFETCH_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/fastfetch/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $FASTFETCH_CONF_DIR"
    return 0
  fi

  if [ -L "$FASTFETCH_CONF_DIR" ] && [ "$(readlink "$FASTFETCH_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$FASTFETCH_CONF_DIR" || return 1
  fi
}
