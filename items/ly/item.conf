#!/usr/bin/env bash

LY_TTY="${LY_TTY:-tty2}"
LY_DISABLE_EXISTING_DM="${LY_DISABLE_EXISTING_DM:-0}"
LY_UNIT_FILE="/usr/lib/systemd/system/ly@.service"
LY_CONFIG_DEST="/etc/ly/config.ini"
LY_DUR_DEST="/etc/ly/black-hole.dur"

function _ly_service() {
  printf 'ly@%s.service\n' "$LY_TTY"
}

function _ly_getty_service() {
  printf 'getty@%s.service\n' "$LY_TTY"
}

function _ly_src_config() {
  printf '%s/items/ly/src/config.ini\n' "$rootdir"
}

function _ly_src_dur() {
  printf '%s/items/ly/src/black-hole.dur\n' "$rootdir"
}

function _ly_unit_exists() {
  local unit="$1"
  local unit_info

  unit_info="$(systemctl list-unit-files "$unit" --no-legend 2>/dev/null)" || return 1
  [ -n "$unit_info" ]
}

function _ly_has_session_file() {
  local session

  for session in \
    /usr/share/wayland-sessions/hyprland.desktop \
    /usr/share/wayland-sessions/hyprland-uwsm.desktop \
    /usr/share/wayland-sessions/*.desktop \
    /usr/share/xsessions/*.desktop; do
    [ -f "$session" ] && return 0
  done

  return 1
}

function _ly_disable_unit_if_known() {
  local unit="$1"

  if _ly_unit_exists "$unit"; then
    run sudo systemctl disable "$unit" || return 1
  fi
}

function _ly_backup_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    run sudo mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  run sudo mv "$path" "${backup}.${index}" || return 1
}

function _ly_install_config() {
  local src_config

  src_config="$(_ly_src_config)"
  [ -f "$src_config" ] || {
    echo "Missing Ly config source: $src_config" >&2
    return 1
  }

  if [ -f "$LY_CONFIG_DEST" ] && cmp -s "$src_config" "$LY_CONFIG_DEST"; then
    return 0
  fi

  run sudo install -d -m 755 "$(dirname "$LY_CONFIG_DEST")" || return 1

  if [ -f "$LY_CONFIG_DEST" ]; then
    _ly_backup_path "$LY_CONFIG_DEST" || return 1
  elif [ -e "$LY_CONFIG_DEST" ] || [ -L "$LY_CONFIG_DEST" ]; then
    echo "Refusing to replace non-regular path: $LY_CONFIG_DEST" >&2
    return 1
  fi

  run sudo install -m 644 "$src_config" "$LY_CONFIG_DEST" || return 1
}

function _ly_install_dur() {
  local src_dur

  src_dur="$(_ly_src_dur)"
  [ -f "$src_dur" ] || {
    echo "Missing Ly dur animation source: $src_dur" >&2
    return 1
  }

  if [ -f "$LY_DUR_DEST" ] && cmp -s "$src_dur" "$LY_DUR_DEST"; then
    return 0
  fi

  run sudo install -d -m 755 "$(dirname "$LY_DUR_DEST")" || return 1

  if [ -f "$LY_DUR_DEST" ]; then
    _ly_backup_path "$LY_DUR_DEST" || return 1
  elif [ -e "$LY_DUR_DEST" ] || [ -L "$LY_DUR_DEST" ]; then
    echo "Refusing to replace non-regular path: $LY_DUR_DEST" >&2
    return 1
  fi

  run sudo install -m 644 "$src_dur" "$LY_DUR_DEST" || return 1
}

function check_dep() {
  local missing=0

  if ! command -v systemctl >/dev/null 2>&1; then
    echo "Missing dependency: systemctl"
    missing=1
  fi

  if ! command -v ly-dm >/dev/null 2>&1; then
    echo "Missing dependency: ly-dm"
    missing=1
  fi

  if [ ! -f "$LY_UNIT_FILE" ]; then
    echo "Missing systemd unit: $LY_UNIT_FILE"
    missing=1
  fi

  if [ ! -f "$(_ly_src_config)" ]; then
    echo "Missing Ly config source: $(_ly_src_config)"
    missing=1
  fi

  if [ ! -f "$(_ly_src_dur)" ]; then
    echo "Missing Ly dur animation source: $(_ly_src_dur)"
    missing=1
  fi

  if ! _ly_has_session_file; then
    echo "Missing desktop session file under /usr/share/wayland-sessions or /usr/share/xsessions"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependency: ly"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm ly || return 1
  else
    echo "No supported package manager detected. Install ly manually."
    return 1
  fi
}

function check() {
  command -v systemctl >/dev/null 2>&1 || return 1
  command -v ly-dm >/dev/null 2>&1 || return 1
  [ -f "$LY_UNIT_FILE" ] || return 1
  _ly_has_session_file || return 1
  [ -f "$LY_DUR_DEST" ] || return 1
  cmp -s "$(_ly_src_dur)" "$LY_DUR_DEST" || return 1
  [ -f "$LY_CONFIG_DEST" ] || return 1
  cmp -s "$(_ly_src_config)" "$LY_CONFIG_DEST" || return 1

  systemctl is-enabled --quiet "$(_ly_service)" >/dev/null 2>&1 || return 1

  if systemctl is-enabled --quiet "$(_ly_getty_service)" >/dev/null 2>&1; then
    return 1
  fi

  if [[ "$LY_DISABLE_EXISTING_DM" == 1 ]]; then
    if _ly_unit_exists "sddm.service" && systemctl is-enabled --quiet "sddm.service" >/dev/null 2>&1; then
      return 1
    fi

    if _ly_unit_exists "display-manager.service" && systemctl is-enabled --quiet "display-manager.service" >/dev/null 2>&1; then
      return 1
    fi
  fi

  return 0
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would install $(_ly_src_dur) to $LY_DUR_DEST"
    echo "Would back up an existing regular $LY_DUR_DEST before replacing it"
    echo "Would install $(_ly_src_config) to $LY_CONFIG_DEST"
    echo "Would back up an existing regular $LY_CONFIG_DEST before replacing it"
    echo "Would disable $(_ly_getty_service)"
    echo "Would enable $(_ly_service)"

    if [[ "$LY_DISABLE_EXISTING_DM" == 1 ]]; then
      echo "Would disable sddm.service when it exists"
      echo "Would disable display-manager.service when it exists"
    else
      echo "Would leave the current display manager enabled until Ly is verified"
    fi

    return 0
  fi

  _ly_install_dur || return 1
  _ly_install_config || return 1
  run sudo systemctl disable "$(_ly_getty_service)" || return 1
  run sudo systemctl enable "$(_ly_service)" || return 1

  if [[ "$LY_DISABLE_EXISTING_DM" == 1 ]]; then
    _ly_disable_unit_if_known "sddm.service" || return 1
    _ly_disable_unit_if_known "display-manager.service" || return 1
  else
    echo "Leaving the current display manager enabled until Ly is verified."
    echo "Set LY_DISABLE_EXISTING_DM=1 and rerun this item after testing Ly to disable SDDM."
  fi
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would disable $(_ly_service)"
    echo "Would leave other display managers unchanged"
    return 0
  fi

  run sudo systemctl disable "$(_ly_service)" || return 1
}
