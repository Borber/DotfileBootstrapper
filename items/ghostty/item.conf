#!/usr/bin/env bash

GHOSTTY_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/ghostty"

function check_dep() {
  command -v ghostty >/dev/null 2>&1 || return 1
  command -v fish >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: ghostty fish"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm ghostty fish || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install --cask ghostty || return 1
    run brew install fish || return 1
  else
    echo "No supported package manager detected. Install ghostty and fish manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/ghostty/src"

  [ -L "$GHOSTTY_CONF_DIR" ] && [ "$(readlink "$GHOSTTY_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$GHOSTTY_CONF_DIR/config.ghostty" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/ghostty/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $GHOSTTY_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$GHOSTTY_CONF_DIR")" || return 1

  if [ -d "$GHOSTTY_CONF_DIR" ] && [ ! -L "$GHOSTTY_CONF_DIR" ]; then
    mv "$GHOSTTY_CONF_DIR" "${GHOSTTY_CONF_DIR}.bak" || return 1
  elif [ -e "$GHOSTTY_CONF_DIR" ] || [ -L "$GHOSTTY_CONF_DIR" ]; then
    rm -rf "$GHOSTTY_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$GHOSTTY_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/ghostty/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $GHOSTTY_CONF_DIR"
    return 0
  fi

  if [ -L "$GHOSTTY_CONF_DIR" ] && [ "$(readlink "$GHOSTTY_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$GHOSTTY_CONF_DIR" || return 1
  fi
}
