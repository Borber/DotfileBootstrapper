#!/usr/bin/env bash

STEAM_RUN_CHWD="${STEAM_RUN_CHWD:-1}"
STEAM_ENABLE_POWER_PROFILES="${STEAM_ENABLE_POWER_PROFILES:-1}"
STEAM_INSTALL_CACHYOS_GAMING_APPLICATIONS="${STEAM_INSTALL_CACHYOS_GAMING_APPLICATIONS:-0}"

STEAM_BASE_PACKAGES=(
  cachyos-gaming-meta
  cachyos-settings
  steam
  proton-cachyos-slr
  protonup-qt
  mesa
  lib32-mesa
  vulkan-intel
  lib32-vulkan-intel
  vulkan-icd-loader
  lib32-vulkan-icd-loader
  vulkan-tools
  intel-media-driver
  libva-utils
  mesa-utils
  gamescope
  mangohud
  goverlay
  power-profiles-daemon
)

STEAM_RUNTIME_COMMANDS=(
  steam
  game-performance
  gamescope
  mangohud
  protonup-qt
  vulkaninfo
  glxinfo
  vainfo
)

function _steam_required_packages() {
  printf '%s\n' "${STEAM_BASE_PACKAGES[@]}"

  if [[ "$STEAM_INSTALL_CACHYOS_GAMING_APPLICATIONS" == 1 ]]; then
    printf '%s\n' "cachyos-gaming-applications"
  fi
}

function _steam_missing_packages() {
  local package
  local missing=0

  command -v pacman >/dev/null 2>&1 || return 2

  while IFS= read -r package; do
    pacman -Qq "$package" >/dev/null 2>&1 || {
      printf '%s\n' "$package"
      missing=1
    }
  done < <(_steam_required_packages)

  return "$missing"
}

function _steam_power_profiles_enabled() {
  [[ "$STEAM_ENABLE_POWER_PROFILES" == 1 ]] || return 0
  command -v systemctl >/dev/null 2>&1 || return 1
  systemctl is-enabled --quiet power-profiles-daemon >/dev/null 2>&1
}

function check_dep() {
  local command_name
  local missing=0
  local missing_packages
  local package

  if ! command -v pacman >/dev/null 2>&1; then
    echo "Missing dependency: pacman"
    missing=1
  elif missing_packages="$(_steam_missing_packages)"; then
    :
  else
    if [[ -n "$missing_packages" ]]; then
      echo "Missing packages:"
      while IFS= read -r package; do
        echo "  - $package"
      done <<< "$missing_packages"
      missing=1
    fi
  fi

  for command_name in "${STEAM_RUNTIME_COMMANDS[@]}"; do
    if ! command -v "$command_name" >/dev/null 2>&1; then
      echo "Missing command: $command_name"
      missing=1
    fi
  done

  if [[ "$STEAM_RUN_CHWD" == 1 ]] && ! command -v chwd >/dev/null 2>&1; then
    echo "Missing CachyOS hardware detection command: chwd"
    missing=1
  fi

  if [[ "$STEAM_ENABLE_POWER_PROFILES" == 1 ]] && ! command -v systemctl >/dev/null 2>&1; then
    echo "Missing dependency: systemctl"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  local packages=()
  local package

  echo "Required Steam/CachyOS gaming packages:"
  while IFS= read -r package; do
    packages+=("$package")
    echo "  - $package"
  done < <(_steam_required_packages)

  echo "If lib32-* packages cannot be resolved, enable the multilib repository first."

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm "${packages[@]}" || return 1
  else
    echo "No supported package manager detected. Install the packages above manually."
    return 1
  fi
}

function check() {
  check_dep >/dev/null 2>&1 || return 1
  _steam_power_profiles_enabled || return 1
  return 0
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    if [[ "$STEAM_RUN_CHWD" == 1 ]]; then
      echo "Would run: sudo chwd -a"
    else
      echo "Would skip CachyOS hardware profile setup because STEAM_RUN_CHWD=0"
    fi

    if [[ "$STEAM_ENABLE_POWER_PROFILES" == 1 ]]; then
      echo "Would run: sudo systemctl enable --now power-profiles-daemon"
    else
      echo "Would leave power-profiles-daemon unchanged because STEAM_ENABLE_POWER_PROFILES=0"
    fi

    echo "Would leave Steam Proton compatibility settings to be configured in Steam"
    return 0
  fi

  check_dep || {
    echo "Install dependencies first with: ./bootstrap install --item=steam -c -D -v"
    return 1
  }

  if [[ "$STEAM_RUN_CHWD" == 1 ]]; then
    run sudo chwd -a || return 1
  fi

  if [[ "$STEAM_ENABLE_POWER_PROFILES" == 1 ]]; then
    run sudo systemctl enable --now power-profiles-daemon || return 1
  fi

  echo "Steam system dependencies are installed."
  echo "Configure Steam Play and per-game Proton choices inside Steam."
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would leave Steam packages, libraries, prefixes, and power-profiles-daemon unchanged"
    return 0
  fi

  echo "Leaving Steam packages, libraries, prefixes, and power-profiles-daemon unchanged."
  echo "Remove them manually only after backing up game data and saves."
}
