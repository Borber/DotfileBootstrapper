#!/usr/bin/env bash

FISH_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/fish"

function check_dep() {
  command -v fish >/dev/null 2>&1 || return 1
  command -v starship >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: fish starship"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm fish starship || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install fish starship || return 1
  else
    echo "No supported package manager detected. Install fish and starship manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/fish/src"

  [ -L "$FISH_CONF_DIR" ] && [ "$(readlink "$FISH_CONF_DIR")" = "$src_dir" ]
}

function install() {
  local src_dir="$rootdir/items/fish/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $FISH_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$FISH_CONF_DIR")" || return 1

  if [ -d "$FISH_CONF_DIR" ] && [ ! -L "$FISH_CONF_DIR" ]; then
    mv "$FISH_CONF_DIR" "${FISH_CONF_DIR}.bak" || return 1
  elif [ -e "$FISH_CONF_DIR" ] || [ -L "$FISH_CONF_DIR" ]; then
    rm -rf "$FISH_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$FISH_CONF_DIR" || return 1
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $FISH_CONF_DIR"
    return 0
  fi

  if [ -L "$FISH_CONF_DIR" ]; then
    rm -f "$FISH_CONF_DIR" || return 1
  fi
}
