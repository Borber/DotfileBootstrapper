#!/usr/bin/env bash

ZELLIJ_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/zellij"

function check_dep() {
  command -v zellij >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: zellij"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm zellij || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install zellij || return 1
  else
    echo "No supported package manager detected. Install zellij manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/zellij/src"

  [ -L "$ZELLIJ_CONF_DIR" ] && [ "$(readlink "$ZELLIJ_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$ZELLIJ_CONF_DIR/config.kdl" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/zellij/src"
  local backup_path

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $ZELLIJ_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$ZELLIJ_CONF_DIR")" || return 1

  if [ -e "$ZELLIJ_CONF_DIR" ] || [ -L "$ZELLIJ_CONF_DIR" ]; then
    if [ -L "$ZELLIJ_CONF_DIR" ]; then
      rm -f "$ZELLIJ_CONF_DIR" || return 1
    else
      backup_path="${ZELLIJ_CONF_DIR}.bak"
      if [ -e "$backup_path" ] || [ -L "$backup_path" ]; then
        backup_path="${ZELLIJ_CONF_DIR}.bak.$(date +%Y%m%d%H%M%S)"
      fi
      mv "$ZELLIJ_CONF_DIR" "$backup_path" || return 1
    fi
  fi

  ln -snf "$src_dir" "$ZELLIJ_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/zellij/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $ZELLIJ_CONF_DIR"
    return 0
  fi

  if [ -L "$ZELLIJ_CONF_DIR" ] && [ "$(readlink "$ZELLIJ_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$ZELLIJ_CONF_DIR" || return 1
  fi
}
