#!/usr/bin/env bash

DROPBOX_DIR="${DROPBOX_DIR:-$HOME/Dropbox}"
DROPBOX_INFO_FILE="${DROPBOX_INFO_FILE:-$HOME/.dropbox/info.json}"
DROPBOX_AUTOSTART_FILE="${DROPBOX_AUTOSTART_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/autostart/dropbox.desktop}"
DROPBOX_AUTOSTART_MARKER="X-DotfileBootstrapper-managed=true"

function _dropbox_backup_path() {
  local path="$1"
  local backup="${path}.bak"
  local index=1

  if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
    mv "$path" "$backup" || return 1
    return 0
  fi

  while [ -e "${backup}.${index}" ] || [ -L "${backup}.${index}" ]; do
    index=$((index + 1))
  done

  mv "$path" "${backup}.${index}" || return 1
}

function _dropbox_normalize_path() {
  local path="$1"

  if command -v python3 >/dev/null 2>&1; then
    python3 -c 'import os, sys; print(os.path.abspath(os.path.expanduser(sys.argv[1])))' "$path"
  else
    printf '%s\n' "$path"
  fi
}

function _dropbox_info_paths() {
  [ -f "$DROPBOX_INFO_FILE" ] || return 1
  command -v python3 >/dev/null 2>&1 || return 2

  python3 -c '
import json
import os
import sys

with open(sys.argv[1], encoding="utf-8") as info_file:
    data = json.load(info_file)

paths = []
for account in data.values():
    if isinstance(account, dict):
        path = account.get("path")
        if isinstance(path, str) and path:
            paths.append(os.path.abspath(os.path.expanduser(path)))

if not paths:
    sys.exit(1)

print("\n".join(paths))
' "$DROPBOX_INFO_FILE"
}

function _dropbox_info_matches_expected_dir() {
  local expected
  local actual
  local paths

  [ -f "$DROPBOX_INFO_FILE" ] || return 0
  command -v python3 >/dev/null 2>&1 || return 0

  expected="$(_dropbox_normalize_path "$DROPBOX_DIR")" || return 1
  paths="$(_dropbox_info_paths)" || return 1

  while IFS= read -r actual; do
    [ "$actual" = "$expected" ] && return 0
  done <<< "$paths"

  return 1
}

function _dropbox_print_path_mismatch() {
  local expected
  local actual
  local paths

  expected="$(_dropbox_normalize_path "$DROPBOX_DIR")" || expected="$DROPBOX_DIR"

  if ! paths="$(_dropbox_info_paths 2>/dev/null)"; then
    echo "Could not read Dropbox directory from $DROPBOX_INFO_FILE"
    return 0
  fi

  echo "Dropbox is linked to a different sync directory."
  echo "Expected Dropbox directory: $expected"
  while IFS= read -r actual; do
    echo "Actual Dropbox directory:   $actual"
  done <<< "$paths"
  echo "Move the Dropbox folder from Dropbox Preferences, then rerun this item."
}

function _dropbox_autostart_file_starts_dropbox() {
  [ -f "$DROPBOX_AUTOSTART_FILE" ] || return 1
  grep -E '^Exec=.*dropbox([[:space:]]+|$).*start' "$DROPBOX_AUTOSTART_FILE" >/dev/null 2>&1
}

function _dropbox_autostart_file_managed() {
  [ -f "$DROPBOX_AUTOSTART_FILE" ] || return 1
  grep -F "$DROPBOX_AUTOSTART_MARKER" "$DROPBOX_AUTOSTART_FILE" >/dev/null 2>&1
}

function _dropbox_install_autostart_file() {
  if _dropbox_autostart_file_starts_dropbox; then
    return 0
  fi

  mkdir -p "$(dirname "$DROPBOX_AUTOSTART_FILE")" || return 1

  if [ -e "$DROPBOX_AUTOSTART_FILE" ] || [ -L "$DROPBOX_AUTOSTART_FILE" ]; then
    echo "Backing up existing Dropbox autostart file to ${DROPBOX_AUTOSTART_FILE}.bak ..."
    _dropbox_backup_path "$DROPBOX_AUTOSTART_FILE" || return 1
  fi

  {
    printf '%s\n' "[Desktop Entry]"
    printf '%s\n' "Type=Application"
    printf '%s\n' "Name=Dropbox"
    printf '%s\n' "Exec=dropbox start -i"
    printf '%s\n' "Terminal=false"
    printf '%s\n' "X-GNOME-Autostart-enabled=true"
    printf '%s\n' "$DROPBOX_AUTOSTART_MARKER"
  } > "$DROPBOX_AUTOSTART_FILE" || return 1
}

function _dropbox_prepare_sync_dir() {
  if [ -d "$DROPBOX_DIR" ]; then
    return 0
  fi

  if [ -f "$DROPBOX_DIR" ]; then
    echo "Backing up existing file $DROPBOX_DIR to ${DROPBOX_DIR}.bak ..."
    _dropbox_backup_path "$DROPBOX_DIR" || return 1
  elif [ -e "$DROPBOX_DIR" ] || [ -L "$DROPBOX_DIR" ]; then
    echo "Refusing to replace non-directory path: $DROPBOX_DIR" >&2
    return 1
  fi

  mkdir -p "$DROPBOX_DIR" || return 1
}

function check_dep() {
  local missing=0

  if ! command -v dropbox >/dev/null 2>&1; then
    echo "Missing dependency: dropbox"
    missing=1
  fi

  if ! command -v python3 >/dev/null 2>&1; then
    echo "Optional dependency missing: python3. Dropbox path verification will be limited."
  fi

  return "$missing"
}

function install_dep() {
  echo "Required dependency: dropbox"

  if command -v dropbox >/dev/null 2>&1; then
    return 0
  fi

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed dropbox || return 1
  elif command -v yay >/dev/null 2>&1; then
    run yay -S --needed dropbox || return 1
  elif command -v pacman >/dev/null 2>&1; then
    echo "Dropbox is distributed through AUR on Arch-based systems."
    echo "Install it with an AUR helper, for example: paru -S --needed dropbox"
    return 1
  else
    echo "No supported package manager detected for automatic Dropbox installation."
    echo "Install Dropbox for Linux from: https://www.dropbox.com/install-linux"
    return 1
  fi
}

function check() {
  command -v dropbox >/dev/null 2>&1 || return 1
  [ -d "$DROPBOX_DIR" ] || return 1
  _dropbox_autostart_file_starts_dropbox || return 1
  _dropbox_info_matches_expected_dir || return 1
  return 0
}

function install() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would ensure Dropbox sync directory exists at $DROPBOX_DIR"
    echo "Would back up an existing regular file at $DROPBOX_DIR before creating the directory"
    echo "Would install or verify XDG autostart file at $DROPBOX_AUTOSTART_FILE"
    echo "Would run: dropbox autostart y"
    echo "Would run: dropbox start -i"
    echo "Would verify Dropbox info path when $DROPBOX_INFO_FILE exists"
    return 0
  fi

  command -v dropbox >/dev/null 2>&1 || {
    echo "Missing dependency: dropbox"
    return 1
  }

  _dropbox_prepare_sync_dir || return 1
  _dropbox_install_autostart_file || return 1

  if ! run dropbox autostart y; then
    echo "Dropbox CLI autostart setup failed; keeping XDG autostart fallback at $DROPBOX_AUTOSTART_FILE"
  fi

  run dropbox start -i || return 1

  if ! _dropbox_info_matches_expected_dir; then
    _dropbox_print_path_mismatch
    return 1
  fi

  if [ ! -f "$DROPBOX_INFO_FILE" ]; then
    echo "Dropbox started. Complete the account linking flow if Dropbox prompts for login."
  fi
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would run: dropbox autostart n"
    echo "Would run: dropbox stop"

    if _dropbox_autostart_file_managed; then
      echo "Would remove managed autostart file $DROPBOX_AUTOSTART_FILE"
    else
      echo "Would leave non-managed Dropbox autostart file unchanged"
    fi

    echo "Would leave Dropbox sync directory $DROPBOX_DIR untouched"
    return 0
  fi

  if command -v dropbox >/dev/null 2>&1; then
    run dropbox autostart n || return 1
    run dropbox stop >/dev/null 2>&1 || true
  fi

  if _dropbox_autostart_file_managed; then
    rm -f "$DROPBOX_AUTOSTART_FILE" || return 1
  fi

  echo "Leaving Dropbox sync directory untouched: $DROPBOX_DIR"
}
