#!/usr/bin/env bash

NORDZY_CURSOR_SIZE="${NORDZY_CURSOR_SIZE:-24}"
NORDZY_GTK3_SETTINGS="${NORDZY_GTK3_SETTINGS:-${CONFIG_DIR:-$HOME/.config}/gtk-3.0/settings.ini}"
NORDZY_GTK4_SETTINGS="${NORDZY_GTK4_SETTINGS:-${CONFIG_DIR:-$HOME/.config}/gtk-4.0/settings.ini}"

function _nordzy_hypr_cursor_file() {
  local repo_root="${rootdir:-$PWD}"
  printf '%s\n' "${NORDZY_HYPR_CURSOR_FILE:-$repo_root/items/hypr/src/dms/cursor.lua}"
}

function _nordzy_theme_exists() {
  local theme="$1"
  local base

  for base in \
    "${XDG_DATA_HOME:-$HOME/.local/share}/icons" \
    "$HOME/.icons" \
    "/usr/local/share/icons" \
    "/usr/share/icons"; do
    [ -d "$base/$theme" ] && return 0
  done

  return 1
}

function _nordzy_xcursor_theme() {
  if [ -n "${NORDZY_XCURSOR_THEME:-}" ]; then
    printf '%s\n' "$NORDZY_XCURSOR_THEME"
  elif _nordzy_theme_exists "Nordzy-cursors"; then
    printf '%s\n' "Nordzy-cursors"
  else
    printf '%s\n' "Nordzy-cursors"
  fi
}

function _nordzy_hyprcursor_theme() {
  if [ -n "${NORDZY_HYPRCURSOR_THEME:-}" ]; then
    printf '%s\n' "$NORDZY_HYPRCURSOR_THEME"
  elif _nordzy_theme_exists "Nordzy-hyprcursors"; then
    printf '%s\n' "Nordzy-hyprcursors"
  elif _nordzy_theme_exists "Nordzy-cursors-hyprcursor"; then
    printf '%s\n' "Nordzy-cursors-hyprcursor"
  else
    printf '%s\n' "Nordzy-hyprcursors"
  fi
}

function _nordzy_backup_once() {
  local path="$1"
  local backup="${path}.bak"

  if { [ -e "$path" ] || [ -L "$path" ]; } && { [ ! -e "$backup" ] && [ ! -L "$backup" ]; }; then
    cp -a "$path" "$backup" || return 1
  fi
}

function _nordzy_restore_backup() {
  local path="$1"
  local backup="${path}.bak"

  if [ -e "$backup" ] || [ -L "$backup" ]; then
    rm -f "$path" || return 1
    cp -a "$backup" "$path" || return 1
  fi
}

function _nordzy_hypr_config_matches() {
  local file
  local hypr_theme
  local xcursor_theme

  file="$(_nordzy_hypr_cursor_file)"
  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  [ -f "$file" ] || return 1
  grep -F "hl.env(\"HYPRCURSOR_THEME\", \"$hypr_theme\")" "$file" >/dev/null 2>&1 || return 1
  grep -F "hl.env(\"HYPRCURSOR_SIZE\", \"$NORDZY_CURSOR_SIZE\")" "$file" >/dev/null 2>&1 || return 1
  grep -F "hl.env(\"XCURSOR_THEME\", \"$xcursor_theme\")" "$file" >/dev/null 2>&1 || return 1
  grep -F "hl.env(\"XCURSOR_SIZE\", \"$NORDZY_CURSOR_SIZE\")" "$file" >/dev/null 2>&1 || return 1
}

function _nordzy_gtk_config_matches() {
  local file="$1"
  local xcursor_theme

  xcursor_theme="$(_nordzy_xcursor_theme)"

  [ -f "$file" ] || return 1
  grep -F "gtk-cursor-theme-name=$xcursor_theme" "$file" >/dev/null 2>&1 || return 1
  grep -F "gtk-cursor-theme-size=$NORDZY_CURSOR_SIZE" "$file" >/dev/null 2>&1 || return 1
}

function _nordzy_write_hypr_config() {
  local file
  local dir
  local tmp
  local hypr_theme
  local xcursor_theme

  file="$(_nordzy_hypr_cursor_file)"
  dir="$(dirname "$file")"
  tmp="${file}.tmp.$$"
  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  mkdir -p "$dir" || return 1
  _nordzy_backup_once "$file" || return 1

  {
    printf '%s\n' "-- Managed by nordzy-cursors item."
    printf '%s\n' ""
    printf 'hl.env("HYPRCURSOR_THEME", "%s")\n' "$hypr_theme"
    printf 'hl.env("HYPRCURSOR_SIZE", "%s")\n' "$NORDZY_CURSOR_SIZE"
    printf 'hl.env("XCURSOR_THEME", "%s")\n' "$xcursor_theme"
    printf 'hl.env("XCURSOR_SIZE", "%s")\n' "$NORDZY_CURSOR_SIZE"
  } > "$tmp" || {
    rm -f "$tmp"
    return 1
  }

  if [ -L "$file" ]; then
    cp "$tmp" "$file" || {
      rm -f "$tmp"
      return 1
    }
    rm -f "$tmp" || return 1
  else
    mv "$tmp" "$file" || return 1
  fi
}

function _nordzy_set_ini_value() {
  local file="$1"
  local key="$2"
  local value="$3"
  local dir
  local tmp
  local input

  dir="$(dirname "$file")"
  tmp="${file}.tmp.$$"
  input="$file"

  mkdir -p "$dir" || return 1
  _nordzy_backup_once "$file" || return 1

  if [ ! -f "$input" ]; then
    input="/dev/null"
  fi

  awk -v key="$key" -v value="$value" '
    BEGIN {
      in_settings = 0
      saw_settings = 0
      done = 0
    }
    /^\[Settings\][[:space:]]*$/ {
      print
      in_settings = 1
      saw_settings = 1
      next
    }
    /^\[/ {
      if (in_settings && !done) {
        print key "=" value
        done = 1
      }
      in_settings = 0
      print
      next
    }
    in_settings && index($0, key "=") == 1 {
      if (!done) {
        print key "=" value
        done = 1
      }
      next
    }
    {
      print
    }
    END {
      if (!saw_settings) {
        print "[Settings]"
        print key "=" value
      } else if (in_settings && !done) {
        print key "=" value
      }
    }
  ' "$input" > "$tmp" || {
    rm -f "$tmp"
    return 1
  }

  if [ -L "$file" ]; then
    cp "$tmp" "$file" || {
      rm -f "$tmp"
      return 1
    }
    rm -f "$tmp" || return 1
  else
    mv "$tmp" "$file" || return 1
  fi
}

function _nordzy_set_gtk_config() {
  local file="$1"
  local xcursor_theme

  xcursor_theme="$(_nordzy_xcursor_theme)"

  _nordzy_set_ini_value "$file" "gtk-cursor-theme-name" "$xcursor_theme" || return 1
  _nordzy_set_ini_value "$file" "gtk-cursor-theme-size" "$NORDZY_CURSOR_SIZE" || return 1
}

function _nordzy_remove_ini_value_if_owned() {
  local file="$1"
  local key="$2"
  local value="$3"
  local tmp

  [ -f "$file" ] || return 0

  tmp="${file}.tmp.$$"

  awk -v key="$key" -v value="$value" '
    index($0, key "=") == 1 && $0 == key "=" value {
      next
    }
    {
      print
    }
  ' "$file" > "$tmp" || {
    rm -f "$tmp"
    return 1
  }

  if [ -L "$file" ]; then
    cp "$tmp" "$file" || {
      rm -f "$tmp"
      return 1
    }
    rm -f "$tmp" || return 1
  else
    mv "$tmp" "$file" || return 1
  fi
}

function _nordzy_remove_gtk_config() {
  local file="$1"
  local xcursor_theme

  xcursor_theme="$(_nordzy_xcursor_theme)"

  if [ -e "${file}.bak" ] || [ -L "${file}.bak" ]; then
    _nordzy_restore_backup "$file"
    return $?
  fi

  _nordzy_remove_ini_value_if_owned "$file" "gtk-cursor-theme-name" "$xcursor_theme" || return 1
  _nordzy_remove_ini_value_if_owned "$file" "gtk-cursor-theme-size" "$NORDZY_CURSOR_SIZE" || return 1
}

function _nordzy_apply_runtime() {
  local hypr_theme
  local xcursor_theme

  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  if command -v gsettings >/dev/null 2>&1; then
    gsettings set org.gnome.desktop.interface cursor-theme "$xcursor_theme" >/dev/null 2>&1 || true
    gsettings set org.gnome.desktop.interface cursor-size "$NORDZY_CURSOR_SIZE" >/dev/null 2>&1 || true
  fi

  if command -v hyprctl >/dev/null 2>&1 && [ -n "${HYPRLAND_INSTANCE_SIGNATURE:-}" ]; then
    hyprctl setcursor "$hypr_theme" "$NORDZY_CURSOR_SIZE" >/dev/null 2>&1 || true
  fi
}

function check_dep() {
  local missing=0
  local hypr_theme
  local xcursor_theme

  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  if ! _nordzy_theme_exists "$xcursor_theme"; then
    echo "Missing XCursor theme: $xcursor_theme"
    missing=1
  fi

  if ! _nordzy_theme_exists "$hypr_theme"; then
    echo "Missing Hyprcursor theme: $hypr_theme"
    missing=1
  fi

  if ! command -v hyprctl >/dev/null 2>&1; then
    echo "Missing dependency: hyprctl"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  echo "Required cursor packages:"
  echo "  - nordzy-cursors"
  echo "  - nordzy-hyprcursors"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would install Nordzy cursor packages"
    return 0
  fi

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed --noconfirm nordzy-cursors nordzy-hyprcursors && return 0
    echo "Trying alternate Hyprcursor package name..."
    run paru -S --needed --noconfirm nordzy-cursors nordzy-cursors-hyprcursor && return 0
  elif command -v yay >/dev/null 2>&1; then
    run yay -S --needed --noconfirm nordzy-cursors nordzy-hyprcursors && return 0
    echo "Trying alternate Hyprcursor package name..."
    run yay -S --needed --noconfirm nordzy-cursors nordzy-cursors-hyprcursor && return 0
  else
    echo "No supported AUR helper detected. Install manually: nordzy-cursors nordzy-hyprcursors"
    return 1
  fi

  echo "Failed to install Nordzy cursor packages."
  return 1
}

function check() {
  local hypr_theme
  local xcursor_theme

  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  _nordzy_theme_exists "$xcursor_theme" || return 1
  _nordzy_theme_exists "$hypr_theme" || return 1
  _nordzy_hypr_config_matches || return 1
  _nordzy_gtk_config_matches "$NORDZY_GTK3_SETTINGS" || return 1
  _nordzy_gtk_config_matches "$NORDZY_GTK4_SETTINGS" || return 1
}

function install() {
  local hypr_file
  local hypr_theme
  local xcursor_theme

  hypr_file="$(_nordzy_hypr_cursor_file)"
  hypr_theme="$(_nordzy_hyprcursor_theme)"
  xcursor_theme="$(_nordzy_xcursor_theme)"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would set Hyprland cursor theme: $hypr_theme"
    echo "Would set XCursor/GTK cursor theme: $xcursor_theme"
    echo "Would set cursor size: $NORDZY_CURSOR_SIZE"
    echo "Would write $hypr_file"
    echo "Would update $NORDZY_GTK3_SETTINGS"
    echo "Would update $NORDZY_GTK4_SETTINGS"
    return 0
  fi

  if ! check_dep; then
    echo "Nordzy cursor themes are not installed. Install dependencies before applying cursor settings."
    return 1
  fi

  _nordzy_write_hypr_config || return 1
  _nordzy_set_gtk_config "$NORDZY_GTK3_SETTINGS" || return 1
  _nordzy_set_gtk_config "$NORDZY_GTK4_SETTINGS" || return 1
  _nordzy_apply_runtime
}

function uninstall() {
  local hypr_file

  hypr_file="$(_nordzy_hypr_cursor_file)"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would restore $hypr_file from backup if present"
    echo "Would restore or remove Nordzy cursor settings from GTK config"
    return 0
  fi

  if [ -e "${hypr_file}.bak" ] || [ -L "${hypr_file}.bak" ]; then
    _nordzy_restore_backup "$hypr_file" || return 1
  fi

  _nordzy_remove_gtk_config "$NORDZY_GTK3_SETTINGS" || return 1
  _nordzy_remove_gtk_config "$NORDZY_GTK4_SETTINGS" || return 1
}
