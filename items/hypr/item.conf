#!/usr/bin/env bash

HYPR_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/hypr"
HYPR_NOCTALIA_BIN="${NOCTALIA_BIN:-$HOME/.local/bin/noctalia}"

function check_dep() {
  local missing=0

  for dep in Hyprland hyprctl kanshi grimblast grim slurp wl-copy hyprpicker jq notify-send wpctl; do
    if ! command -v "$dep" >/dev/null 2>&1; then
      echo "Missing dependency: $dep"
      missing=1
    fi
  done

  if [ ! -x "$HYPR_NOCTALIA_BIN" ] && ! command -v noctalia >/dev/null 2>&1; then
    echo "Missing dependency: noctalia ($HYPR_NOCTALIA_BIN or PATH)"
    missing=1
  fi

  return "$missing"
}

function install_dep() {
  local arch_deps=(
    hyprland
    hyprutils
    kanshi
    grimblast-git
    grim
    slurp
    wl-clipboard
    hyprpicker
    jq
    libnotify
  )

  echo "Required dependencies:"
  echo "  - Hyprland"
  echo "  - hyprctl"
  echo "  - kanshi"
  echo "  - grimblast"
  echo "  - grim"
  echo "  - slurp"
  echo "  - wl-copy"
  echo "  - hyprpicker"
  echo "  - jq"
  echo "  - notify-send"
  echo "  - wpctl"
  echo "  - noctalia (install the noctalia-local item first)"

  if command -v paru >/dev/null 2>&1; then
    run paru -S --needed --noconfirm "${arch_deps[@]}" || return 1
    echo "Install Noctalia with: ./bootstrap install --item=noctalia-local -c -D -v"
  elif command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm "${arch_deps[@]}" || return 1
    echo "Install Noctalia with: ./bootstrap install --item=noctalia-local -c -D -v"
  elif command -v brew >/dev/null 2>&1; then
    echo "Hyprland dependency installation is not supported through brew here."
    return 1
  else
    echo "No supported package manager detected. Install the required dependencies manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/hypr/src"

  [ -L "$HYPR_CONF_DIR" ] && [ "$(readlink "$HYPR_CONF_DIR")" = "$src_dir" ]
}

function install() {
  local src_dir="$rootdir/items/hypr/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $HYPR_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$HYPR_CONF_DIR")" || return 1

  if [ -d "$HYPR_CONF_DIR" ] && [ ! -L "$HYPR_CONF_DIR" ]; then
    mv "$HYPR_CONF_DIR" "${HYPR_CONF_DIR}.bak" || return 1
  elif [ -e "$HYPR_CONF_DIR" ] || [ -L "$HYPR_CONF_DIR" ]; then
    rm -rf "$HYPR_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$HYPR_CONF_DIR" || return 1
}

function uninstall() {
  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $HYPR_CONF_DIR"
    return 0
  fi

  if [ -L "$HYPR_CONF_DIR" ]; then
    rm -f "$HYPR_CONF_DIR" || return 1
  fi
}
