# DotfileBootstrapper tmux config

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB,ghostty:RGB,*-256color:RGB"
set -g focus-events on
set -g escape-time 10
set -g history-limit 50000
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-clipboard on
set -g mouse on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind S choose-tree -s
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"

bind -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'" "send-keys C-l" "select-pane -R"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

setw -g mode-keys vi
setw -g mode-style "fg=#2D353B,bg=#7FBBB3"
setw -g copy-mode-selection-style "fg=#2D353B,bg=#7FBBB3"
setw -g copy-mode-position-style "fg=#9DA9A0,bg=default"
setw -g window-status-separator ""
bind -T copy-mode-vi v send -X begin-selection
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel'

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#859289"
set -g status-left-length 40
set -g status-right-length 80
set -g message-style "fg=#D3C6AA,bg=#49564f"
set -g message-command-style "fg=#D3C6AA,bg=#49564f"
set -g status-left "#{?client_prefix,#[fg=#2D353B#,bg=#7FBBB3#,bold]  PREFIX ,#[fg=#2D353B#,bg=#A7C080#,bold]  #S }"
set -g status-right "#[fg=#A7C080,bg=#49564f,bold] #{b:pane_current_path} "
setw -g window-status-format "#[fg=#859289,bg=#49564f] #I:#W "
setw -g window-status-current-format "#[fg=#A7C080,bg=#49564f,bold] #I:#W "

set -g pane-border-style "fg=#3D484D"
set -g pane-active-border-style "fg=#A7C080"
