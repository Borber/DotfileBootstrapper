#!/usr/bin/env bash

TMUX_CONF_DIR="${CONFIG_DIR:-$HOME/.config}/tmux"

function check_dep() {
  command -v tmux >/dev/null 2>&1 || return 1
  return 0
}

function install_dep() {
  echo "Required dependency: tmux"

  if command -v pacman >/dev/null 2>&1; then
    run sudo pacman -S --needed --noconfirm tmux || return 1
  elif command -v brew >/dev/null 2>&1; then
    run brew install tmux || return 1
  else
    echo "No supported package manager detected. Install tmux manually."
    return 1
  fi
}

function check() {
  local src_dir="$rootdir/items/tmux/src"

  [ -L "$TMUX_CONF_DIR" ] && [ "$(readlink "$TMUX_CONF_DIR")" = "$src_dir" ] || return 1
  [ -f "$TMUX_CONF_DIR/tmux.conf" ] || return 1
}

function install() {
  local src_dir="$rootdir/items/tmux/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would link $TMUX_CONF_DIR -> $src_dir"
    return 0
  fi

  mkdir -p "$(dirname "$TMUX_CONF_DIR")" || return 1

  if [ -d "$TMUX_CONF_DIR" ] && [ ! -L "$TMUX_CONF_DIR" ]; then
    mv "$TMUX_CONF_DIR" "${TMUX_CONF_DIR}.bak" || return 1
  elif [ -e "$TMUX_CONF_DIR" ] || [ -L "$TMUX_CONF_DIR" ]; then
    rm -rf "$TMUX_CONF_DIR" || return 1
  fi

  ln -snf "$src_dir" "$TMUX_CONF_DIR" || return 1
}

function uninstall() {
  local src_dir="$rootdir/items/tmux/src"

  if [[ "${dry_run:-0}" == 1 ]]; then
    echo "Would remove $TMUX_CONF_DIR"
    return 0
  fi

  if [ -L "$TMUX_CONF_DIR" ] && [ "$(readlink "$TMUX_CONF_DIR")" = "$src_dir" ]; then
    rm -f "$TMUX_CONF_DIR" || return 1
  fi
}
